name: Deploy Shiny R App to Posit Connect

on:
  push:
    branches: [main]
    paths:
      - 'lab/**'
      - '.github/workflows/deploy-shinyr.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify lab directory structure
        run: |
          echo "Checking lab directory..."
          ls -la lab/
          echo "Checking for manifest.json..."
          test -f lab/manifest.json && echo "✓ manifest.json exists" || echo "✗ manifest.json MISSING"
          echo "Checking for app.R..."
          test -f lab/app.R && echo "✓ app.R exists" || echo "✗ app.R MISSING"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.1'
          use-public-rspm: true

      - name: Verify R installation
        run: |
          R --version
          Rscript -e "cat('R is working\n')"

      - name: Publish to Posit Connect
        uses: rstudio/actions/connect-publish@main
        with:
          url: ${{ secrets.CONNECT_SERVER }}
          api-key: ${{ secrets.CONNECT_API_KEY }}
          access-type: acl
          dir: lab
          show-logs: true
          force: false
