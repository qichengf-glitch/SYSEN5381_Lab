name: Deploy Shiny R App to Posit Connect

on:
  push:
    branches: [main]
    paths:
      - 'lab/**'
      - '.github/workflows/deploy-lab-posit-connect.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        id: precheck
        env:
          CONNECT_SERVER: ${{ secrets.CONNECT_SERVER }}
          CONNECT_API_KEY: ${{ secrets.CONNECT_API_KEY }}
        run: |
          if [ -z "$CONNECT_SERVER" ] || [ -z "$CONNECT_API_KEY" ]; then
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy: CONNECT_SERVER and/or CONNECT_API_KEY not set."
          else
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up R
        if: steps.precheck.outputs.can_deploy == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.1'
          use-public-rspm: true

      - name: Publish to Posit Connect
        if: steps.precheck.outputs.can_deploy == 'true'
        uses: rstudio/actions/connect-publish@main
        with:
          url: ${{ secrets.CONNECT_SERVER }}
          api-key: ${{ secrets.CONNECT_API_KEY }}
          access-type: acl
          dir: lab
          show-logs: true
          force: false
