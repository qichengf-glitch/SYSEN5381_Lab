name: Deploy to Posit Connect

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy R content
    runs-on: ubuntu-latest
    env:
      APP_DIR: ${{ vars.POSIT_APP_DIR }}
      CONNECT_SERVER: ${{ secrets.CONNECT_SERVER }}
      CONNECT_ACCOUNT: ${{ secrets.CONNECT_ACCOUNT }}
      CONNECT_API_KEY: ${{ secrets.CONNECT_API_KEY }}
      CONNECT_API_SECRET: ${{ secrets.CONNECT_API_SECRET }}
      CONNECT_APP_NAME: ${{ vars.CONNECT_APP_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve defaults
        run: |
          echo "APP_DIR=${APP_DIR:-lab}" >> "$GITHUB_ENV"

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install rsconnect
        run: Rscript -e 'install.packages("rsconnect", repos = "https://cloud.r-project.org")'

      - name: Build manifest.json
        run: Rscript 04_deployment/positconnect/shinyr/manifestme.R "$APP_DIR"

      - name: Deploy app to Posit Connect
        run: |
          Rscript - <<'EOF'
          required <- c("CONNECT_SERVER", "CONNECT_ACCOUNT", "CONNECT_API_KEY", "CONNECT_API_SECRET")
          missing <- required[Sys.getenv(required) == ""]
          if (length(missing)) {
            stop("Missing required GitHub secrets: ", paste(missing, collapse = ", "))
          }

          rsconnect::setAccountInfo(
            name = Sys.getenv("CONNECT_ACCOUNT"),
            server = Sys.getenv("CONNECT_SERVER"),
            apiKey = Sys.getenv("CONNECT_API_KEY"),
            apiSecret = Sys.getenv("CONNECT_API_SECRET")
          )

          deploy_args <- list(
            appDir = Sys.getenv("APP_DIR"),
            server = Sys.getenv("CONNECT_SERVER"),
            account = Sys.getenv("CONNECT_ACCOUNT"),
            forceUpdate = TRUE,
            launch.browser = FALSE,
            logLevel = "verbose"
          )

          app_name <- Sys.getenv("CONNECT_APP_NAME")
          if (nzchar(app_name)) {
            deploy_args$appName <- app_name
          }

          do.call(rsconnect::deployApp, deploy_args)
          EOF
